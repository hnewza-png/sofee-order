<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Greek Yogurt by Sofee</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #1a0a0e; font-family: 'Sarabun', sans-serif; color: #f8e8ec; }

  /* ---- LOGIN PAGE ---- */
  .login-page {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a0a0e 0%, #2d1020 50%, #1a0a1e 100%);
    padding: 24px;
  }
  .login-card {
    width: 100%; max-width: 360px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 36px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeUp 0.5s ease;
  }
  .login-logo { text-align: center; margin-bottom: 24px; }
  .login-logo .emoji { font-size: 52px; }
  .login-logo h1 { font-size: 20px; font-weight: 700; color: #fff; margin-top: 10px; }
  .login-logo p { font-size: 12px; color: #9e6070; margin-top: 4px; }

  .login-label { font-size: 13px; color: #f8bbd0; font-weight: 600; display: block; margin-bottom: 6px; }
  .login-input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px; color: #fff;
    font-size: 14px; font-family: 'Sarabun', sans-serif;
    outline: none; margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: #f06292; }
  .login-input::placeholder { color: #6d4050; }

  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #f06292, #c2185b);
    color: #fff; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'Sarabun', sans-serif;
    transition: all 0.2s; margin-top: 4px;
  }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(233,30,99,0.4); }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .login-error {
    background: rgba(233,30,99,0.15);
    border: 1px solid rgba(233,30,99,0.3);
    border-radius: 10px; padding: 10px 14px;
    font-size: 13px; color: #f48fb1;
    margin-top: 14px; display: none;
    text-align: center;
  }

  /* ---- ADMIN PAGE ---- */
  .admin-page { display: none; padding-bottom: 60px; }

  .topbar { background: linear-gradient(135deg, #6d3b47, #a0293f); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 16px rgba(0,0,0,0.4); }
  .topbar-left h1 { font-size: 16px; font-weight: 700; color: #fff; }
  .topbar-left p { font-size: 11px; color: #f8bbd0; margin-top: 2px; }
  .topbar-right { display: flex; gap: 8px; align-items: center; }

  .icon-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); color: #f8bbd0; border-radius: 20px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all 0.2s; }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }
  .icon-btn.logout { color: #f48fb1; }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 16px; }
  .stat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px 10px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 700; color: #f06292; }
  .stat-label { font-size: 11px; color: #c48b9f; margin-top: 2px; }

  .filter-row { display: flex; gap: 8px; padding: 4px 16px 12px; overflow-x: auto; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.15); background: transparent; color: #f8bbd0; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: 'Sarabun', sans-serif; transition: all 0.2s; }
  .filter-btn.active { background: #e91e63; border-color: #e91e63; color: #fff; }

  .section-title { font-size: 13px; font-weight: 700; color: #f8bbd0; padding: 4px 16px 8px; text-transform: uppercase; letter-spacing: 1px; }
  .order-list { padding: 0 12px; display: flex; flex-direction: column; gap: 10px; }
  .order-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 14px 16px; transition: all 0.2s; animation: fadeUp 0.3s ease both; }
  .order-card.done { opacity: 0.45; }
  .order-card.done .order-name { text-decoration: line-through; }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .order-name { font-size: 16px; font-weight: 700; color: #fff; }
  .order-details { font-size: 13px; color: #e8c4cc; line-height: 1.7; margin-bottom: 10px; }
  .order-note { font-size: 12px; color: #f48fb1; background: rgba(244,143,177,0.1); border-radius: 8px; padding: 6px 10px; margin-bottom: 10px; }
  .order-footer { display: flex; justify-content: space-between; align-items: center; }
  .order-price { font-size: 16px; font-weight: 700; color: #f06292; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-new { background: rgba(233,30,99,0.2); color: #f06292; border: 1px solid rgba(233,30,99,0.3); }
  .badge-done { background: rgba(102,187,106,0.15); color: #66bb6a; border: 1px solid rgba(102,187,106,0.3); }
  .done-btn { padding: 6px 14px; border-radius: 20px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all 0.2s; }
  .done-btn.mark { background: #e91e63; color: #fff; }
  .done-btn.unmark { background: rgba(255,255,255,0.1); color: #c48b9f; }
  .delete-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; opacity: 0.5; transition: opacity 0.2s; }
  .delete-btn:hover { opacity: 1; }
  .empty { text-align: center; padding: 48px 20px; color: #6d3b47; font-size: 14px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 48px; color: #9e6070; font-size: 14px; }
  .size-badge { display: inline-block; width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,#f06292,#e91e63); color: #fff; font-size: 13px; font-weight: 700; text-align: center; line-height: 28px; margin-right: 6px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>

<script>
// Global references
var _auth, _db;

function doLogin() {
  if (!_auth) { alert("ระบบยังโหลดไม่เสร็จ กรุณารอสักครู่"); return; }
  var email = document.getElementById("emailInput").value.trim();
  var password = document.getElementById("passwordInput").value;
  var btn = document.getElementById("loginBtn");
  var errEl = document.getElementById("loginError");
  if (!email || !password) {
    errEl.textContent = "⚠️ กรุณากรอก email และ password";
    errEl.style.display = "block"; return;
  }
  btn.disabled = true;
  btn.textContent = "⏳ กำลังเข้าสู่ระบบ...";
  errEl.style.display = "none";
  _auth.signInWithEmailAndPassword(email, password).catch(function(error) {
    btn.disabled = false;
    btn.textContent = "🔐 เข้าสู่ระบบ";
    errEl.textContent = "❌ " + error.code + ": " + error.message;
    errEl.style.display = "block";
  });
}

function toggleDone(key, currentStatus) {
  if (!_db) return;
  _db.ref("orders/" + key).update({ status: currentStatus === "done" ? "new" : "done" });
}

function deleteOrder(key) {
  if (!_db) return;
  if (confirm("ย้ายไปถังขยะ?")) {
    _db.ref("orders/" + key).update({ status: "deleted" });
  }
}

function restoreOrder(key) {
  if (!_db) return;
  _db.ref("orders/" + key).update({ status: "new" });
}

function permanentDelete(key) {
  if (!_db) return;
  if (confirm("ลบถาวร? ข้อมูลจะหายไปเลย")) {
    _db.ref("orders/" + key).remove();
  }
}

function confirmPayment(key, currentStatus) {
  if (!_db) return;
  var newStatus = currentStatus === 'confirmed' ? 'pending' : 'confirmed';
  _db.ref("orders/" + key).update({ paymentStatus: newStatus });
}

function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src; s.onload = cb;
  document.head.appendChild(s);
}

window.onload = function() {
  loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js', function() {
    loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js', function() {
      loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js', function() {
        startApp();
      });
    });
  });
};

function startApp() {
  var firebaseConfig = {
    apiKey: "AIzaSyAQedOuBVy4RQO_TceOSR3p3qUMcw4YTIw",
    authDomain: "sofee-order-dev-5dace.firebaseapp.com",
    databaseURL: "https://sofee-order-dev-5dace-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sofee-order-dev-5dace",
    storageBucket: "sofee-order-dev-5dace.firebasestorage.app",
    messagingSenderId: "803170527873",
    appId: "1:803170527873:web:27965c338d14225a767b80"
  };

  firebase.initializeApp(firebaseConfig);
  _auth = firebase.auth();
  _db = firebase.database();

  var allOrders = [];
  var currentFilter = "all";

  _auth.onAuthStateChanged(function(user) {
    if (user) {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("adminPage").style.display = "block";
      loadOrders();
    } else {
      document.getElementById("loginPage").style.display = "flex";
      document.getElementById("adminPage").style.display = "none";
    }
  });

  document.getElementById("logoutBtn").onclick = function() {
    if (confirm("ออกจากระบบ?")) _auth.signOut();
  };
  document.getElementById("refreshBtn").onclick = loadOrders;
  document.getElementById("filterAll").onclick = function() { setFilter("all", "filterAll"); };
  document.getElementById("filterNew").onclick = function() { setFilter("new", "filterNew"); };
  document.getElementById("filterDone").onclick = function() { setFilter("done", "filterDone"); };
  document.getElementById("filterDeleted").onclick = function() { setFilter("deleted", "filterDeleted"); };

  function setFilter(f, id) {
    currentFilter = f;
    document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
    document.getElementById(id).classList.add("active");
    renderOrders();
  }

  function loadOrders() {
    document.getElementById("lastUpdate").textContent = "กำลังโหลด...";
    _db.ref("orders").on("value", function(snapshot) {
      allOrders = [];
      snapshot.forEach(function(child) {
        allOrders.push(Object.assign({ key: child.key }, child.val()));
      });
      allOrders.reverse();
      renderOrders();
      document.getElementById("lastUpdate").textContent = "อัปเดตล่าสุด " + new Date().toLocaleTimeString("th-TH");
    });
  }

  function renderOrders() {
    var list = document.getElementById("orderList");

    // active orders = not deleted
    var activeOrders = allOrders.filter(function(o){ return o.status !== "deleted"; });
    var deletedOrders = allOrders.filter(function(o){ return o.status === "deleted"; });

    var filtered;
    if (currentFilter === "all") filtered = activeOrders;
    else if (currentFilter === "done") filtered = activeOrders.filter(function(o){ return o.status === "done"; });
    else if (currentFilter === "deleted") filtered = deletedOrders;
    else filtered = activeOrders.filter(function(o){ return o.status !== "done"; });

    // stats based on active only
    document.getElementById("statTotal").textContent = activeOrders.length;
    document.getElementById("statNew").textContent = activeOrders.filter(function(o){ return o.status !== "done"; }).length;
    document.getElementById("statIncome").textContent = activeOrders.reduce(function(s,o){ return s+(o.price||0); }, 0).toLocaleString();

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">' + (currentFilter === "deleted" ? "🗑️" : "📭") + '</div>' + (currentFilter === "deleted" ? "ไม่มี order ในถังขยะ" : "ไม่มี Order ในหมวดนี้") + '</div>';
      return;
    }

    list.innerHTML = filtered.map(function(o) {
      var isDeleted = o.status === "deleted";
      var isDone = o.status === "done";

      var actionBtn = isDeleted
        ? '<div style="display:flex;gap:6px;">' +
          '<button class="done-btn mark" onclick="restoreOrder(\'' + o.key + '\')" style="background:rgba(102,187,106,0.3);color:#66bb6a;">↩️ คืนค่า</button>' +
          '<button class="done-btn unmark" onclick="permanentDelete(\'' + o.key + '\')" style="background:rgba(233,30,99,0.2);color:#f06292;">🗑️ ลบถาวร</button>' +
          '</div>'
        : '<button class="done-btn ' + (isDone ? "unmark" : "mark") + '" onclick="toggleDone(\'' + o.key + '\',\'' + o.status + '\')">' +
          (isDone ? "↩️ ยังไม่เสร็จ" : "✅ ทำเสร็จแล้ว") + '</button>';

      var statusBadge = isDeleted
        ? '<span class="badge" style="background:rgba(158,96,112,0.2);color:#9e6070;border:1px solid rgba(158,96,112,0.3);">🗑️ ลบแล้ว</span>'
        : '<span class="badge ' + (isDone ? "badge-done" : "badge-new") + '">' + (isDone ? "✅ เสร็จแล้ว" : "🔴 รอทำ") + '</span>';

      var paymentBadge = o.paymentLabel
        ? '<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:4px;' +
          (o.payment === 'cash' ? 'background:rgba(255,193,7,0.15);color:#ffc107;border:1px solid rgba(255,193,7,0.3);">' : 'background:rgba(66,165,245,0.15);color:#42a5f5;border:1px solid rgba(66,165,245,0.3);">') +
          o.paymentLabel + '</span>'
        : '';

      var paymentConfirmBtn = (o.payment === 'transfer')
        ? (o.paymentStatus === 'confirmed'
          ? '<button class="done-btn" onclick="confirmPayment(\'' + o.key + '\',\'confirmed\')" style="background:rgba(102,187,106,0.2);color:#66bb6a;border:1px solid rgba(102,187,106,0.3);margin-bottom:6px;width:100%;">✅ รับโอนแล้ว — กดเพื่อยกเลิก</button>'
          : '<button class="done-btn" onclick="confirmPayment(\'' + o.key + '\',\'pending\')" style="background:rgba(66,165,245,0.2);color:#42a5f5;border:1px solid rgba(66,165,245,0.3);margin-bottom:6px;width:100%;">💰 ยืนยันรับโอนแล้ว</button>')
        : (o.payment === 'cash')
        ? (o.paymentStatus === 'confirmed'
          ? '<button class="done-btn" onclick="confirmPayment(\'' + o.key + '\',\'confirmed\')" style="background:rgba(102,187,106,0.2);color:#66bb6a;border:1px solid rgba(102,187,106,0.3);margin-bottom:6px;width:100%;">✅ รับเงินสดแล้ว — กดเพื่อยกเลิก</button>'
          : '<button class="done-btn" onclick="confirmPayment(\'' + o.key + '\',\'pending\')" style="background:rgba(255,193,7,0.2);color:#ffc107;border:1px solid rgba(255,193,7,0.3);margin-bottom:6px;width:100%;">💵 ยืนยันรับเงินสดแล้ว</button>')
        : '';

      return '<div class="order-card' + (isDone ? " done" : "") + (isDeleted ? '" style="opacity:0.5' : "") + '">' +
        '<div class="order-top"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
        (o.orderNo ? '<span style="background:linear-gradient(135deg,#f06292,#c2185b);color:#fff;font-size:13px;font-weight:700;padding:2px 10px;border-radius:20px;">#' + o.orderNo + '</span>' : '') +
        '<span class="order-name">👤 ' + o.name + '</span>' +
        statusBadge + paymentBadge + '</div>' +
        (!isDeleted ? '<button class="delete-btn" onclick="deleteOrder(\'' + o.key + '\')">🗑️</button>' : '') +
        '</div>' +
        '<div class="order-details">' +
        '<span class="size-badge">' + o.size + '</span>' + (o.size === "L" ? "2 สกู๊ป" : "1 สกู๊ป") + ' x' + o.qty + '<br>' +
        '🍓 ' + o.fruits + '<br>🎁 ' + o.extras + '</div>' +
        (o.note ? '<div class="order-note">📝 ' + o.note + '</div>' : '') +
        '<div style="margin-bottom:6px;">' + paymentConfirmBtn + '</div>' +
        '<div class="order-footer"><div>' +
        '<div class="order-price">' + (o.price||0).toLocaleString() + ' ฿</div>' +
        '<div style="font-size:11px;color:#9e6070;margin-top:2px">' + (o.timeStr||"") + '</div></div>' +
        actionBtn + '</div></div>';
    }).join("");
  }
}
</script>
</body>
</html>
