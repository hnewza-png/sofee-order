<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Yogurt by Sofee 🥛</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fff5f0 0%, #fce4ec 50%, #f3e5f5 100%);
    font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px 16px 48px;
  }
  .container { width: 100%; max-width: 420px; }
  .header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.6s ease; }
  .header .icon { font-size: 44px; margin-bottom: 6px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #6d3b47; letter-spacing: 0.5px; margin-bottom: 8px; }
  .header .badge { font-size: 12px; color: #b06070; background: #fff0f3; display: inline-block; padding: 4px 16px; border-radius: 20px; border: 1px solid #f8c8d0; }
  .progress { display: flex; justify-content: center; align-items: center; gap: 6px; margin-bottom: 22px; }
  .step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: #f8bbd0; color: #c48b9f; transition: all 0.3s; }
  .step-dot.active { background: #f06292; color: #fff; transform: scale(1.1); }
  .step-dot.done { background: #e91e63; color: #fff; }
  .step-dot.complete { background: linear-gradient(135deg, #66bb6a, #388e3c); color: #fff; transform: scale(1.2); animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275); font-size: 14px; }
  .step-line { width: 16px; height: 2px; background: #f8bbd0; border-radius: 2px; transition: all 0.3s; }
  .step-line.done { background: #e91e63; }
  .card { background: rgba(255,255,255,0.92); border-radius: 20px; padding: 24px; box-shadow: 0 8px 32px rgba(173,80,110,0.13); animation: fadeUp 0.4s ease; }
  .card-title { font-size: 16px; font-weight: 700; color: #6d3b47; margin-bottom: 16px; }
  .back-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: #b06070; padding: 0; margin-right: 8px; vertical-align: middle; transition: transform 0.15s; }
  .back-btn:hover { transform: translateX(-3px); }
  .size-btn { width: 100%; background: linear-gradient(135deg, #fff0f3, #fce4ec); border: 2px solid #f8bbd0; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; cursor: pointer; text-align: left; transition: all 0.2s; }
  .size-btn:hover { border-color: #f06292; transform: translateY(-1px); }
  .size-btn.selected { background: linear-gradient(135deg, #f06292, #e91e63); border-color: #e91e63; transform: scale(1.01); }
  .size-row { display: flex; justify-content: space-between; align-items: center; }
  .size-name { font-size: 18px; font-weight: 700; color: #6d3b47; }
  .size-desc { font-size: 12px; color: #b06070; margin-left: 8px; }
  .size-price { font-size: 17px; font-weight: 700; color: #e91e63; }
  .size-extras { font-size: 12px; color: #c48b9f; margin-top: 4px; }
  .size-btn.selected .size-name, .size-btn.selected .size-desc, .size-btn.selected .size-price, .size-btn.selected .size-extras { color: #fff !important; }
  .fruit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .fruit-btn { background: #fff0f3; border: 2px solid #f8bbd0; border-radius: 12px; padding: 12px 10px; cursor: pointer; text-align: center; transition: all 0.18s; }
  .fruit-btn:hover:not(:disabled) { border-color: #f06292; transform: translateY(-2px); }
  .fruit-btn.selected { background: linear-gradient(135deg, #f06292, #e91e63); border-color: #e91e63; transform: scale(1.05); }
  .fruit-btn:disabled { opacity: 0.4; cursor: not-allowed; background: #fafafa; }
  .fruit-emoji { font-size: 28px; margin-bottom: 4px; }
  .fruit-name { font-size: 12px; color: #6d3b47; font-weight: 400; }
  .fruit-btn.selected .fruit-name { color: #fff; font-weight: 700; }
  .btn-primary { width: 100%; background: linear-gradient(135deg, #f06292, #c2185b); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Sarabun', sans-serif; }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(233,30,99,0.35); }
  .btn-primary:disabled { background: #f8bbd0; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-outline { width: 100%; background: transparent; color: #b06070; border: 1.5px solid #f8bbd0; border-radius: 12px; padding: 12px; font-size: 14px; cursor: pointer; margin-top: 10px; transition: all 0.2s; font-family: 'Sarabun', sans-serif; }
  .btn-outline:hover { background: #fff0f3; }
  .summary-box { background: linear-gradient(135deg, #fff0f3, #fce4ec); border: 1px solid #f8bbd0; border-radius: 14px; padding: 16px; margin-bottom: 16px; font-size: 13px; color: #6d3b47; line-height: 1.7; }
  label { font-size: 13px; color: #6d3b47; font-weight: 600; display: block; margin-bottom: 6px; }
  input[type="text"] { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #f8bbd0; font-size: 14px; color: #6d3b47; outline: none; background: #fffafe; margin-bottom: 14px; font-family: 'Sarabun', sans-serif; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: #f06292; }
  textarea { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #f8bbd0; font-size: 14px; color: #6d3b47; outline: none; background: #fffafe; margin-bottom: 14px; font-family: 'Sarabun', sans-serif; transition: border-color 0.2s; resize: none; line-height: 1.6; }
  textarea:focus { border-color: #f06292; }
  .qty-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .qty-btn { width: 36px; height: 36px; border-radius: 50%; background: #fce4ec; border: 1.5px solid #f8bbd0; font-size: 20px; color: #e91e63; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .qty-btn:hover { background: #f8bbd0; }
  .qty-num { font-size: 20px; font-weight: 700; color: #6d3b47; min-width: 26px; text-align: center; }
  .qty-total { font-size: 13px; color: #c48b9f; }
  .done-icon { font-size: 52px; text-align: center; margin-bottom: 8px; animation: bounce 0.6s ease; }
  .order-box { background: #fff8f9; border: 1.5px dashed #f48fb1; border-radius: 14px; padding: 16px; font-size: 13px; color: #6d3b47; white-space: pre-line; line-height: 1.9; margin-bottom: 16px; text-align: left; }
  .footer { text-align: center; font-size: 11px; color: #c48b9f; margin-top: 16px; }
  .saving-overlay { text-align:center; padding: 12px; font-size: 13px; color: #b06070; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%,100% { transform: scale(1); } 40% { transform: scale(1.3); } 70% { transform: scale(0.9); } }
  @keyframes popIn { 0% { transform: scale(0); opacity:0; } 60% { transform: scale(1.35); } 100% { transform: scale(1.2); opacity:1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🥛</div>
    <h1>Greek Yogurt by Sofee</h1>
    <div class="badge">🌟 รับ Order ส่งวันศุกร์-เสาร์-อาทิตย์นี้ 🌟</div>
  </div>
  <div class="progress">
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-line" id="line1"></div>
    <div class="step-dot" id="dot2">2</div>
    <div class="step-line" id="line2"></div>
    <div class="step-dot" id="dot3">3</div>
    <div class="step-line" id="line3"></div>
    <div class="step-dot" id="dot4">4</div>
  </div>
  <div class="card" id="card"></div>
  <div class="footer">Greek Yogurt by Sofee 🥛 made with love</div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvIHJud05sw3pDyoLyZHreZTuE",
  authDomain: "sofee-order-be272.firebaseapp.com",
  databaseURL: "https://sofee-order-be272-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sofee-order-be272",
  storageBucket: "sofee-order-be272.firebasestorage.app",
  messagingSenderId: "764695346353",
  appId: "1:764695346353:web:18831670c0c1f4e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._firebaseDb = db;
window._firebaseRef = ref;
window._firebasePush = push;
window._firebaseReady = true;
</script>

<script>
const fruits = [
  { id: "orange", label: "ส้ม", emoji: "🍊" },
  { id: "grape", label: "องุ่น", emoji: "🍇" },
  { id: "kiwi", label: "กีวี", emoji: "🥝" },
  { id: "banana", label: "กล้วย", emoji: "🍌" },
  { id: "strawberry", label: "สตรอว์เบอร์รี", emoji: "🍓" },
  { id: "blueberry", label: "บลูเบอร์รี", emoji: "🫐" },
  { id: "dragonfruit", label: "แก้วมังกร", emoji: "🐉" },
];
const sizes = [
  { id: "S", price: 69, scoops: 1, fruitCount: 2, extras: ["น้ำผึ้ง 🍯"], desc: "Greek Yogurt 1 สกู๊ป" },
  { id: "M", price: 89, scoops: 1, fruitCount: 3, extras: ["กราโนล่า 🌾", "น้ำผึ้ง 🍯"], desc: "Greek Yogurt 1 สกู๊ป" },
  { id: "L", price: 149, scoops: 2, fruitCount: 3, extras: ["กราโนล่า 🌾", "น้ำผึ้ง 🍯"], desc: "Greek Yogurt 2 สกู๊ป" },
];
let state = { step: 1, selectedSize: null, selectedFruits: [], name: "", qty: 1, note: "", orderText: "", copied: false };

function updateProgress() {
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById("dot" + i);
    dot.className = "step-dot";
    if (i === 4 && state.step === 4) {
      dot.className = "step-dot complete";
      dot.textContent = "✓";
    } else if (i < state.step) {
      dot.classList.add("done");
      dot.textContent = i;
    } else if (i === state.step) {
      dot.classList.add("active");
      dot.textContent = i;
    } else {
      dot.textContent = i;
    }
  }
  for (let i = 1; i <= 3; i++) {
    const line = document.getElementById("line" + i);
    line.className = "step-line";
    if (i < state.step) line.classList.add("done");
  }
}

function render() {
  updateProgress();
  const card = document.getElementById("card");
  card.style.animation = "none";
  requestAnimationFrame(() => { card.style.animation = "fadeUp 0.35s ease"; });
  if (state.step === 1) renderStep1(card);
  else if (state.step === 2) renderStep2(card);
  else if (state.step === 3) renderStep3(card);
  else if (state.step === 4) renderStep4(card);
}

function renderStep1(card) {
  card.innerHTML = `<div class="card-title">เลือกไซส์ที่ต้องการ 🥣</div>` +
    sizes.map(s => `
      <button class="size-btn${state.selectedSize === s.id ? " selected" : ""}" onclick="selectSize('${s.id}')">
        <div class="size-row">
          <div><span class="size-name">ไซส์ ${s.id}</span><span class="size-desc">${s.desc}</span></div>
          <span class="size-price">${s.price} ฿</span>
        </div>
        <div class="size-extras">🍓 เลือกผลไม้ได้ ${s.fruitCount} อย่าง · 🎁 แถมฟรี ${s.extras.join(", ")}</div>
      </button>`).join("");
}

function selectSize(id) { state.selectedSize = id; state.selectedFruits = []; state.step = 2; render(); }

function renderStep2(card) {
  const size = sizes.find(s => s.id === state.selectedSize);
  const remaining = size.fruitCount - state.selectedFruits.length;
  card.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:4px">
      <button class="back-btn" onclick="goBack(1)">←</button>
      <span class="card-title" style="margin:0">เลือกผลไม้ ${state.selectedFruits.length}/${size.fruitCount} 🍓</span>
    </div>
    <p style="font-size:12px;color:#c48b9f;margin-bottom:16px">ไซส์ ${state.selectedSize} · เลือกได้ 1–${size.fruitCount} อย่าง</p>
    <div class="fruit-grid">
      ${fruits.map(f => {
        const sel = state.selectedFruits.includes(f.id);
        const dis = !sel && state.selectedFruits.length >= size.fruitCount;
        return `<button class="fruit-btn${sel ? " selected" : ""}" ${dis ? "disabled" : ""} onclick="toggleFruit('${f.id}')">
          <div class="fruit-emoji">${f.emoji}</div><div class="fruit-name">${f.label}</div></button>`;
      }).join("")}
    </div>
    <button class="btn-primary" ${state.selectedFruits.length === 0 ? "disabled" : ""} onclick="goStep(3)">
      ${state.selectedFruits.length === 0 ? "เลือกผลไม้อย่างน้อย 1 อย่าง" : `ถัดไป → (เลือกแล้ว ${state.selectedFruits.length}/${size.fruitCount})`}
    </button>`;
}

function toggleFruit(id) {
  const size = sizes.find(s => s.id === state.selectedSize);
  if (state.selectedFruits.includes(id)) state.selectedFruits = state.selectedFruits.filter(f => f !== id);
  else if (state.selectedFruits.length < size.fruitCount) state.selectedFruits.push(id);
  render();
}

function renderStep3(card) {
  const size = sizes.find(s => s.id === state.selectedSize);
  const fruitNames = state.selectedFruits.map(id => { const f = fruits.find(f => f.id === id); return f.emoji + f.label; }).join(", ");
  card.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <button class="back-btn" onclick="goBack(2)">←</button>
      <span class="card-title" style="margin:0">ยืนยัน Order 📋</span>
    </div>
    <div class="summary-box">
      <div><b>ไซส์ ${size.id}</b> — ${size.price} ฿ · ${size.desc}</div>
      <div>🍓 ผลไม้: ${fruitNames}</div>
      <div>🎁 แถมฟรี: ${size.extras.join(", ")}</div>
    </div>
    <label>ชื่อ <span style="color:#e91e63">*</span></label>
    <input type="text" id="nameInput" placeholder="พิมพ์ชื่อของคุณ..." value="${state.name}" oninput="state.name=this.value.trim()">
    <label>โน๊ต / ความต้องการพิเศษ (ไม่บังคับ)</label>
    <textarea id="noteInput" rows="3" placeholder="เช่น ไม่ใส่น้ำผึ้ง, หวานน้อย..." oninput="state.note=this.value">${state.note}</textarea>
    <label>จำนวน</label>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-num">${state.qty}</span>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
      <span class="qty-total">รวม <b>${size.price * state.qty} ฿</b></span>
    </div>
    <button class="btn-primary" id="confirmBtn" onclick="confirmOrder()">✅ สร้าง Order ของฉัน</button>
    <div id="nameError" style="color:#e91e63;font-size:12px;margin-top:8px;display:none;">⚠️ กรุณาใส่ชื่อก่อนนะคะ</div>`;
}

function changeQty(delta) { state.qty = Math.max(1, state.qty + delta); render(); }

async function confirmOrder() {
  if (!state.name || state.name.trim() === "") {
    const err = document.getElementById("nameError");
    const input = document.getElementById("nameInput");
    if (err) err.style.display = "block";
    if (input) { input.style.borderColor = "#e91e63"; input.focus(); }
    return;
  }
  const size = sizes.find(s => s.id === state.selectedSize);
  const fruitNames = state.selectedFruits.map(id => { const f = fruits.find(f => f.id === id); return f.emoji + f.label; }).join(", ");
  state.orderText =
    `🛍️ Order: Greek Yogurt by Sofee\n` +
    `👤 ชื่อ: ${state.name || "(ไม่ระบุ)"}\n` +
    `📦 ไซส์ ${size.id} — ${size.price * state.qty} บาท (x${state.qty})\n` +
    `🍓 ผลไม้: ${fruitNames}\n` +
    `🎁 แถมฟรี: ${size.extras.join(", ")}` +
    (state.note ? `\n📝 โน๊ต: ${state.note}` : "");

  const btn = document.getElementById("confirmBtn");
  if (btn) { btn.disabled = true; btn.textContent = "⏳ กำลังบันทึก..."; }

  // Save to Firebase
  try {
    if (window._firebaseReady) {
      const orderData = {
        name: state.name || "(ไม่ระบุ)",
        size: size.id,
        price: size.price * state.qty,
        qty: state.qty,
        fruits: fruitNames,
        extras: size.extras.join(", "),
        note: state.note || "",
        status: "new",
        timestamp: Date.now(),
        timeStr: new Date().toLocaleString("th-TH")
      };
      await window._firebasePush(window._firebaseRef(window._firebaseDb, "orders"), orderData);
    }
  } catch(e) { console.log("Firebase error:", e); }

  state.step = 4;
  render();
}

function renderStep4(card) {
  card.innerHTML = `
    <div class="done-icon">🎉</div>
    <h2 style="text-align:center;font-size:16px;color:#6d3b47;margin-bottom:4px;font-weight:700">Order พร้อมแล้ว!</h2>
    <p style="text-align:center;font-size:12px;color:#c48b9f;margin-bottom:14px">บันทึก Order เรียบร้อยแล้ว ✅</p>
    <div class="order-box">${state.orderText}</div>
    <div style="display:flex;gap:10px;margin-bottom:10px">
      <button onclick="copyAndOpenLine()" style="flex:1;padding:14px 8px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;background:linear-gradient(135deg,#f06292,#c2185b);color:#fff;" id="stepCopyBtn">
        1️⃣ คัดลอก Order
      </button>
      <a href="https://line.me/ti/p/~sofeeyah1906" target="_blank" style="flex:1;text-decoration:none;">
        <button style="width:100%;height:100%;padding:14px 8px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;background:linear-gradient(135deg,#06C755,#00a040);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;">
          <svg width="18" height="18" viewBox="0 0 48 48" fill="white"><path d="M24 4C12.95 4 4 11.9 4 21.6c0 5.6 2.9 10.55 7.45 13.8L9.5 42l7.3-3.8C18.7 38.7 21.3 39.2 24 39.2c11.05 0 20-7.9 20-17.6S35.05 4 24 4z"/></svg>
          2️⃣ เปิด Line
        </button>
      </a>
    </div>
    <button class="btn-outline" onclick="resetAll()">+ สั่งใหม่อีกครั้ง</button>`;
}

function copyAndOpenLine() {
  const btn = document.getElementById("stepCopyBtn");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(state.orderText).then(() => showCopied(btn)).catch(() => fallbackCopy(btn));
  } else { fallbackCopy(btn); }
}
function fallbackCopy(btn) {
  const ta = document.createElement("textarea");
  ta.value = state.orderText;
  ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;font-size:16px";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); showCopied(btn); } catch(e) { if (btn) btn.textContent = "⚠️ ลองอีกครั้ง"; }
  document.body.removeChild(ta);
}
function showCopied(btn) {
  if (btn) { btn.innerHTML = "✅ คัดลอกแล้ว!"; btn.style.background = "linear-gradient(135deg,#66bb6a,#388e3c)"; }
}
function goBack(step) { state.step = step; render(); }
function goStep(step) { state.step = step; render(); }
function resetAll() {
  state = { step: 1, selectedSize: null, selectedFruits: [], name: "", qty: 1, note: "", orderText: "", copied: false };
  render();
}
render();
</script>
</body>
</html>
